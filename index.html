<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FIDAL · Gestão de Pedidos Internos</title>
  <meta name="description" content="Gestão de pedidos internos para equipas de consultores imobiliários." />

  <!-- Tipografia Inter (opcional; degrada para system-ui se offline) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;550;600;650;700;750;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Raiz da aplicação: o conteúdo (admin ou consultor) é renderizado por app.js -->
  <div id="app"><!-- render() injeta a experiência ativa aqui --></div>

  <!-- Overlays partilhados -->
  <div id="overlay" class="overlay" data-close="all"></div>

  <!-- Drawer de detalhe do pedido -->
  <aside id="drawer" class="drawer" role="dialog" aria-modal="true" aria-label="Detalhe do pedido">
    <!-- preenchido por openRequestDrawer() -->
  </aside>

  <!-- Modal genérico (novo pedido / revisão) -->
  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-label="Janela">
    <!-- preenchido por openModal() -->
  </div>

  <!-- Diálogo de confirmação -->
  <div id="confirm" class="confirm" role="alertdialog" aria-modal="true">
    <!-- preenchido por confirmDialog() -->
  </div>

  <!-- Contentor de notificações toast -->
  <div id="toasts" class="toasts" aria-live="polite" aria-atomic="false"></div>

  <!-- Cliente Supabase (UMD via CDN). Se estiver offline, a app corre em modo demo. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Configuração (preencher com o seu projeto) → adaptador de dados → aplicação -->
  <script src="config.js"></script>
  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
